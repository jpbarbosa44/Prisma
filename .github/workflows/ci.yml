# Roda os testes a cada push/PR — rede de segurança antes de taguear uma release.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Formatação (gofmt)
        run: |
          fora="$(gofmt -l .)"
          if [ -n "$fora" ]; then
            echo "Arquivos fora do gofmt — rode 'gofmt -w .':"
            echo "$fora"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Testes
        run: go test ./...
