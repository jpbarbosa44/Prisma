# Publica um Release no GitHub quando uma tag vX.Y.Z é enviada.
# Builda os 5 binários, empacota (.tar.gz / .zip), gera o SHA256SUMS e anexa
# tudo ao release. A versão é embutida no binário a partir da própria tag, então
# o `prisma versao` e o verificador de atualização ficam consistentes.
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # necessário para criar o Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Testes
        run: go test ./...

      - name: Build dos binários e pacotes
        run: |
          set -eu
          VERSAO="${GITHUB_REF_NAME}"
          LD="-s -w -X prisma/internal/update.Versao=${VERSAO}"
          mkdir -p dist
          build() { # $1=GOOS  $2=GOARCH  $3=nome do binário
            CGO_ENABLED=0 GOOS="$1" GOARCH="$2" go build -trimpath -ldflags "$LD" -o "dist/$3" ./cmd/prisma
          }
          build linux   amd64 prisma-linux-amd64
          build darwin  arm64 prisma-mac-arm64
          build darwin  amd64 prisma-mac-intel
          build windows amd64 prisma-windows-amd64.exe
          build windows arm64 prisma-windows-arm64.exe

          cd dist
          tar czf prisma-linux-amd64.tar.gz prisma-linux-amd64
          tar czf prisma-mac-arm64.tar.gz   prisma-mac-arm64
          tar czf prisma-mac-intel.tar.gz   prisma-mac-intel
          zip -q  prisma-windows-amd64.zip  prisma-windows-amd64.exe
          zip -q  prisma-windows-arm64.zip  prisma-windows-arm64.exe

          # o SHA256SUMS cobre os binários crus E os pacotes (o auto-update
          # confere o pacote baixado e o binário extraído de dentro dele)
          sha256sum \
            prisma-linux-amd64 prisma-mac-arm64 prisma-mac-intel \
            prisma-windows-amd64.exe prisma-windows-arm64.exe \
            prisma-linux-amd64.tar.gz prisma-mac-arm64.tar.gz prisma-mac-intel.tar.gz \
            prisma-windows-amd64.zip prisma-windows-arm64.zip > SHA256SUMS

      - name: Publicar o Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/prisma-linux-amd64.tar.gz
            dist/prisma-mac-arm64.tar.gz
            dist/prisma-mac-intel.tar.gz
            dist/prisma-windows-amd64.zip
            dist/prisma-windows-arm64.zip
            dist/SHA256SUMS
